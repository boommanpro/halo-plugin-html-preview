name: release

on:
  release:
    types: [created]

jobs:
  build:
    uses: ./.github/workflows/build.yml

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: halo-plugin-html-preview-${{ github.sha }}
          path: dist/

      - name: Resolve version & artifact name
        id: vars
        run: |
          # 从 build.gradle 抽取 version 'x.y.z'
          PACKAGE_VERSION=$(sed -nE "s/^\s*version\s+'([^']+)'.*$/\1/p" build.gradle | head -n1)
          if [ -z "$PACKAGE_VERSION" ]; then
            echo "Failed to extract version from build.gradle"
            exit 1
          fi
          ARTIFACT_NAME="halo-plugin-html-preview-${PACKAGE_VERSION}.jar"
          echo "halo-plugin-html-preview@$PACKAGE_VERSION"
          echo "RELEASE_ID=${{ github.event.release.id }}" >> $GITHUB_ENV
          echo "ARTIFACT_PATHNAME=dist/$ARTIFACT_NAME" >> $GITHUB_ENV
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITHUB_ENV

      - name: Verify artifact exists
        run: |
          ls -la dist/
          test -f "$ARTIFACT_PATHNAME"

      - name: Upload release asset
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs').promises;
            const { repo: { owner, repo } } = context;
            const releaseId = process.env.RELEASE_ID;
            const artifactPathName = process.env.ARTIFACT_PATHNAME;
            const artifactName = process.env.ARTIFACT_NAME;
            console.log('Uploading', artifactName, 'to release', releaseId);
            await github.rest.repos.uploadReleaseAsset({
              owner,
              repo,
              release_id: releaseId,
              name: artifactName,
              data: await fs.readFile(artifactPathName)
            });
